name: Daily Market Pipeline

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC = 7:00 AM Colombia
  workflow_dispatch:        # permite correrlo manualmente desde GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
        run: python scripts/run_daily.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/processed/ \
            data/historical/ \
            data/signals/ \
            reports/
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u '+%Y-%m-%d')"
          git push
